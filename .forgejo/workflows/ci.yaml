name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    # NOTE: Unlike the GitHub Actions workflows (ci.yml / codeql.yml /
    # release.yml), this Forgejo job intentionally does NOT use
    # maxim-lobanov/setup-xcode. It runs on a self-hosted `macos` runner that
    # already has Xcode installed and selected via `xcode-select`, so bare
    # `swift build` / `swift test` resolve the system toolchain directly.
    # The setup-xcode action targets GitHub-hosted runners (multiple Xcodes
    # installed) and is unavailable in the Forgejo action registry.
    runs-on: macos
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Lint (swiftformat)
        run: |
          brew install swiftformat
          swiftformat --lint pippin/ pippin-entry/ Tests/

      - name: Lint (detach-blocking)
        run: |
          python3 scripts/lint-detach-blocking.py --self-test
          python3 scripts/lint-detach-blocking.py
