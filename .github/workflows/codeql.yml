name: CodeQL
permissions:
  contents: read
  security-events: write
  actions: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            runner: macos-15
            build-mode: autobuild
          - language: python
            runner: ubuntu-latest
            build-mode: none
          - language: actions
            runner: ubuntu-latest
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Xcode
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      # Cache the SwiftPM repositories store keyed on Package.resolved.
      # Without this, SPM walks GRDB's full tag graph on every run (~7.6 min).
      - name: Cache SwiftPM
        if: matrix.language == 'swift'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Pre-resolve before CodeQL init so the resolved state is in cache
      # and autobuild can skip the expensive version-computation step.
      - name: Resolve SPM dependencies
        if: matrix.language == 'swift'
        run: swift package resolve

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: /language:${{ matrix.language }}
