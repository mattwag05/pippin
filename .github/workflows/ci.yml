name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Lint (swiftformat)
        run: |
          brew install swiftformat
          swiftformat --lint pippin/ pippin-entry/ Tests/
