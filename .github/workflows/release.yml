name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        run: swift test

      - name: Build release tarball
        run: make tarball

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Determine pre-release
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-alpha"* || "$GITHUB_REF_NAME" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: "${{ github.ref_name }} — pippin"
          body_path: release-notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: .build/release-artifacts/pippin-${{ steps.version.outputs.version }}-arm64-macos.tar.gz
