name: Copilot CI Fix
permissions:
  contents: read
  issues: write
  copilot: write

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  open-copilot-issue:
    name: Open Copilot issue on CI failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Get failed run logs
        id: logs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let summary = [];
            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id,
              });
              // Extract last 60 lines of log (the tail usually has the error)
              const logLines = logs.data.split('\n');
              const tail = logLines.slice(-60).join('\n');
              summary.push(`### ${job.name}\n\`\`\`\n${tail}\n\`\`\``);
            }
            core.setOutput('summary', summary.join('\n\n'));
            core.setOutput('run_url', context.payload.workflow_run.html_url);
            core.setOutput('commit_sha', context.payload.workflow_run.head_sha);
            core.setOutput('commit_msg', context.payload.workflow_run.display_title);

      - name: Create Copilot fix issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const title = `CI failure: ${process.env.COMMIT_MSG}`;
            const body = [
              `CI failed on commit \`${process.env.COMMIT_SHA}\`.`,
              ``,
              `**Run:** ${process.env.RUN_URL}`,
              ``,
              `## Failed job logs`,
              ``,
              process.env.SUMMARY,
              ``,
              `## Instructions`,
              ``,
              `1. Read the failed job logs above.`,
              `2. Identify the root cause of the failure.`,
              `3. Apply the minimal fix needed.`,
              `4. Run \`swiftformat pippin/ pippin-entry/ Tests/\` before committing.`,
              `5. Run \`swift build\` and \`swift test\` to verify the fix.`,
              `6. Open a pull request with the fix.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ci-fix', 'copilot'],
              assignees: ['copilot'],
            });
        env:
          SUMMARY: ${{ steps.logs.outputs.summary }}
          RUN_URL: ${{ steps.logs.outputs.run_url }}
          COMMIT_SHA: ${{ steps.logs.outputs.commit_sha }}
          COMMIT_MSG: ${{ steps.logs.outputs.commit_msg }}
